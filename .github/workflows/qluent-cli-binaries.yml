name: Build Qluent CLI Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            python-version: "3.11"
            artifact-pattern: "qluent-darwin-*"
          - os: ubuntu-latest
            python-version: "3.11"
            artifact-pattern: "qluent-linux-*"
          - os: windows-latest
            python-version: "3.11"
            artifact-pattern: "qluent-windows-*"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: python -m pip install -e .[build]

      - name: Build standalone binary
        run: python -m qluent_cli.build_binary

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qluent-${{ runner.os }}-${{ runner.arch }}
          path: dist/binaries/${{ matrix.artifact-pattern }}
          if-no-files-found: error
          retention-days: 7
